name: Build and deploy Python app to Azure Web App - atosuperstreamrollover

on:
  push:
    branches:
      - main

  workflow_dispatch:


jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read


    steps:

      - name: Checkout source code
        uses: actions/checkout@v4


      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Upload application artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            .
            !antenv/
            !.git/



  deploy:

    runs-on: ubuntu-latest

    needs: build


    permissions:

      id-token: write
      contents: read


    steps:


      - name: Download application artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app



      - name: Login to Azure using OIDC
        uses: azure/login@v2
        with:

          client-id: ${{ secrets.REPLACE_WITH_CLIENTID_SECRET }}

          tenant-id: ${{ secrets.REPLACE_WITH_TENANTID_SECRET }}

          subscription-id: ${{ secrets.REPLACE_WITH_SUBSCRIPTIONID_SECRET }}



      - name: Deploy FastAPI application to Azure Web App
        uses: azure/webapps-deploy@v3

        with:

          app-name: atosuperstreamrollover

          slot-name: Production

          package: .
