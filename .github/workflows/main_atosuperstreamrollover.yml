name: Build and deploy Python app to Azure Web App - atosuperstreamrollover

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      - uses: actions/checkout@v4


      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'


      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      - name: Create deployment package
        run: |
          zip -r release.zip . \
          -x "antenv/*" \
          -x ".git/*"


      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip



  deploy:

    runs-on: ubuntu-latest

    needs: build

    permissions:
      id-token: write
      contents: read


    steps:


      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app


      - name: Login Azure
        uses: azure/login@v2
        with:

          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E29F7A86BD9B4F9D9ED1860C989F9D17 }}

          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F9BABFFCE1EC43C2A0BCDEEF1D9020A7 }}

          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_E40A6DC762BF476AABFEB40911C55D0C }}


      - name: Deploy Azure Web App
        uses: azure/webapps-deploy@v3

        with:

          app-name: atosuperstreamrollover

          slot-name: Production

          package: release.zip
