name: Deploy FastAPI to Azure Web App

on:
  push:
    branches:
      - main

  workflow_dispatch:


jobs:

  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read


    steps:

    - name: Checkout
      uses: actions/checkout@v4


    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"


    - name: Install packages
      run: |

        python -m pip install --upgrade pip

        pip install -r requirements.txt



    - name: Create package
      run: |

        zip -r app.zip . \
        -x ".git/*"



    - name: Upload package
      uses: actions/upload-artifact@v4
      with:

        name: app

        path: app.zip



  deploy:


    runs-on: ubuntu-latest

    needs: build


    permissions:

      id-token: write

      contents: read



    steps:


    - name: Download package
      uses: actions/download-artifact@v4
      with:

        name: app



    - name: Azure Login
      uses: azure/login@v2
      with:

        client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_37AE178FE4E34897A7B31DF1FC8ABC4A }}

        tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_8C898202742F4CE1808FCF16834299A3 }}

        subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_EEAD6383961D46DD9636015F2B5B32A1 }}



    - name: Deploy

      uses: azure/webapps-deploy@v3

      with:

        app-name: atosuperstreamrollover

        package: app.zip
